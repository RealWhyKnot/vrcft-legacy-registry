name: Sync upstream

# Pulls the upstream VRCFaceTracking module list and re-imports each
# entry. The deterministic-zip pass in scripts/import-upstream.py means
# unchanged modules produce byte-identical payload.zip files, so this
# workflow is a no-op on days when upstream hasn't moved.
#
# On a real diff: dropped modules are removed from v1/modules/ and
# v1/index.json; added or updated modules land in incoming/ and the
# follow-up publish workflow (triggered by the bot commit at the end
# of this run, via the paths filter) signs and indexes them.

on:
  schedule:
    # Daily at 09:00 UTC. Upstream doesn't change often; the cadence is
    # mostly there so a release the day before is mirrored before most
    # users wake up.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install import dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull from upstream and re-import
        run: python scripts/sync-upstream.py

      - name: Run publish to drain incoming/ + regenerate index
        run: python scripts/publish.py

      - name: Validate post-sync state
        run: python scripts/validate.py

      - name: Detect changes
        id: changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no diff; upstream hasn't moved since last sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short | head -20
          fi

      - name: Commit + push via GraphQL (signed)
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/graphql-payload.json
          import base64, json, os, subprocess

          out = subprocess.check_output(
              ["git", "status", "--porcelain", "--untracked-files=all"],
              text=True,
          )

          additions = []
          deletions = []
          for line in out.splitlines():
              if not line:
                  continue
              status = line[:2]
              path = line[3:]
              if status[:2] in (" D", "D ", "DD"):
                  deletions.append({"path": path})
                  continue
              if not os.path.isfile(path):
                  continue
              with open(path, "rb") as f:
                  data = f.read()
              additions.append({
                  "path": path,
                  "contents": base64.b64encode(data).decode("ascii"),
              })

          repo = os.environ["GITHUB_REPOSITORY"]
          expected_oid = subprocess.check_output(
              ["git", "rev-parse", "origin/main"], text=True).strip()

          payload = {
              "query": ("mutation($input: CreateCommitOnBranchInput!) {"
                        " createCommitOnBranch(input: $input)"
                        " { commit { oid url } } }"),
              "variables": {
                  "input": {
                      "branch": {
                          "repositoryNameWithOwner": repo,
                          "branchName": "main",
                      },
                      "message": {
                          "headline": "sync: pull upstream VRCFaceTracking module list",
                          "body": "Maintained by .github/workflows/sync-upstream.yml.",
                      },
                      "fileChanges": {
                          "additions": additions,
                          "deletions": deletions,
                      },
                      "expectedHeadOid": expected_oid,
                  },
              },
          }
          json.dump(payload, __import__("sys").stdout)
          print(
              f"additions={len(additions)} deletions={len(deletions)}",
              file=__import__("sys").stderr,
          )
          PY

          response=$(gh api graphql --input /tmp/graphql-payload.json)
          echo "$response" | jq .
          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi
          rm -f /tmp/graphql-payload.json
