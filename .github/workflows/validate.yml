name: Validate

# Runs on every push + pull request. Re-checks: manifest schema, payload
# SHA-256 hashes, cross-coherence between v1/index.json and the per-
# version manifests, and that incoming/ doesn't carry leftover files
# after a publish run.
#
# Required-check this on main if you want server-side enforcement (the
# publish workflow also runs validate.py inline before pushing, so the
# in-tree state is always validated against itself).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate registry
        run: python scripts/validate.py
