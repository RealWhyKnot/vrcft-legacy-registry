name: Publish

# Runs on every push to main that touches incoming/, publishers/, or any
# v1/modules/ tree. Signs and places any pending incoming/<uuid>/<version>/
# entries, then regenerates v1/index.json + v1/trust.json so a publisher
# change (adding a key) ripples without needing a payload push.
#
# The workflow itself commits the result back to main, so an author's
# single "push the incoming/ directory" turns into a finished published
# version with one Cloudflare Pages deploy.

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
      - 'publishers/**'
      - 'scripts/publish.py'
      - 'scripts/requirements.txt'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install signing dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sign + place + regenerate
        env:
          EDDSA_SIGNING_SEED_HEX: ${{ secrets.EDDSA_SIGNING_SEED_HEX }}
        run: python scripts/publish.py

      - name: Validate post-publish state
        # validate.yml runs on every push, but the trust/index regeneration
        # this job is about to commit will only show up in a follow-up bot
        # commit -- and GITHUB_TOKEN commits don't trigger workflows. Run
        # validate.py inline so the *outcome* of this publish is verified
        # before we push the bot commit; if anything's drifted, the push
        # never happens and the workflow fails visibly.
        run: python scripts/validate.py

      - name: Detect changes
        id: changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push via GraphQL (signed)
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .changes-stash

          # Build the additions + deletions list. git status with
          # --untracked-files=all expands new directories to individual
          # files; without it, untracked directories show as a single line
          # (e.g. "?? v1/modules/<uuid>/") and the per-file content loop
          # silently skips them, which is how the 2026-05-13 publish run
          # committed an updated index.json but left the per-version
          # manifest/payload/signature files unpublished.
          ADDITIONS=$(git status --porcelain --untracked-files=all \
                       | awk '$1 ~ /^\?\?|^A|^M/ {print substr($0, 4)}')
          DELETIONS=$(git status --porcelain --untracked-files=all \
                       | awk '$1 ~ /^D/ {print substr($0, 4)}')

          additions_json="[]"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            content_b64=$(base64 -w 0 "$f")
            additions_json=$(jq -c \
              --arg path "$f" \
              --arg contents "$content_b64" \
              '. + [{path: $path, contents: $contents}]' <<<"$additions_json")
          done <<< "$ADDITIONS"
          deletions_json="[]"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            deletions_json=$(jq -c \
              --arg path "$f" \
              '. + [{path: $path}]' <<<"$deletions_json")
          done <<< "$DELETIONS"

          expected_oid=$(git rev-parse origin/main)
          headline="publish: refresh registry artefacts"
          body="Triggered by ${GITHUB_SHA}. Maintained by .github/workflows/publish.yml."

          payload=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "main" \
            --arg headline "$headline" \
            --arg body "$body" \
            --arg oid "$expected_oid" \
            --argjson additions "$additions_json" \
            --argjson deletions "$deletions_json" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $headline, body: $body },
                  fileChanges: { additions: $additions, deletions: $deletions },
                  expectedHeadOid: $oid
                }
              }
            }')

          response=$(printf '%s' "$payload" | gh api graphql --input -)
          echo "$response" | jq .
          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi
