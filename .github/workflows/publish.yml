name: Publish

# Runs on every push to main that touches incoming/, publishers/, or any
# v1/modules/ tree. Signs and places any pending incoming/<uuid>/<version>/
# entries, then regenerates v1/index.json + v1/trust.json so a publisher
# change (adding a key) ripples without needing a payload push.
#
# The workflow itself commits the result back to main, so an author's
# single "push the incoming/ directory" turns into a finished published
# version with one Cloudflare Pages deploy.

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
      - 'publishers/**'
      - 'scripts/publish.py'
      - 'scripts/requirements.txt'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install signing dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sign + place + regenerate
        env:
          EDDSA_SIGNING_SEED_HEX: ${{ secrets.EDDSA_SIGNING_SEED_HEX }}
        run: python scripts/publish.py

      - name: Validate post-publish state
        # validate.yml runs on every push, but the trust/index regeneration
        # this job is about to commit will only show up in a follow-up bot
        # commit -- and GITHUB_TOKEN commits don't trigger workflows. Run
        # validate.py inline so the *outcome* of this publish is verified
        # before we push the bot commit; if anything's drifted, the push
        # never happens and the workflow fails visibly.
        run: python scripts/validate.py

      - name: Detect changes
        id: changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push via GraphQL (signed)
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Build the GraphQL payload in Python so the shell argv size limit
          # doesn't bite. Earlier versions of this step shelled the additions
          # through jq --arg path --arg contents; with eight 500-700 KB
          # payloads (base64-encoded), the combined argv exceeded the
          # kernel's limit and exec failed with "Argument list too long".
          # Python reads each file, base64-encodes, builds the JSON in
          # memory, dumps to a temp file, then pipes via gh api graphql
          # --input <file>. The file is large but neither bash nor jq sees
          # it as command-line args.
          python3 - <<'PY' > /tmp/graphql-payload.json
          import base64, json, os, subprocess

          out = subprocess.check_output(
              ["git", "status", "--porcelain", "--untracked-files=all"],
              text=True,
          )

          additions = []
          deletions = []
          for line in out.splitlines():
              if not line:
                  continue
              status = line[:2]
              path = line[3:]
              if status[:2] in (" D", "D ", "DD"):
                  deletions.append({"path": path})
                  continue
              # Anything else that names a real file: additions.
              if not os.path.isfile(path):
                  continue
              with open(path, "rb") as f:
                  data = f.read()
              additions.append({
                  "path": path,
                  "contents": base64.b64encode(data).decode("ascii"),
              })

          repo = os.environ["GITHUB_REPOSITORY"]
          sha  = os.environ["GITHUB_SHA"]
          expected_oid = subprocess.check_output(
              ["git", "rev-parse", "origin/main"], text=True).strip()

          payload = {
              "query": ("mutation($input: CreateCommitOnBranchInput!) {"
                        " createCommitOnBranch(input: $input)"
                        " { commit { oid url } } }"),
              "variables": {
                  "input": {
                      "branch": {
                          "repositoryNameWithOwner": repo,
                          "branchName": "main",
                      },
                      "message": {
                          "headline": "publish: refresh registry artefacts",
                          "body": (f"Triggered by {sha}. "
                                   "Maintained by .github/workflows/publish.yml."),
                      },
                      "fileChanges": {
                          "additions": additions,
                          "deletions": deletions,
                      },
                      "expectedHeadOid": expected_oid,
                  },
              },
          }
          json.dump(payload, __import__("sys").stdout)
          print(
              f"additions={len(additions)} deletions={len(deletions)}",
              file=__import__("sys").stderr,
          )
          PY

          response=$(gh api graphql --input /tmp/graphql-payload.json)
          echo "$response" | jq .
          if echo "$response" | jq -e '.errors // empty' >/dev/null; then
            echo "::error::createCommitOnBranch returned GraphQL errors"
            exit 1
          fi
          rm -f /tmp/graphql-payload.json
